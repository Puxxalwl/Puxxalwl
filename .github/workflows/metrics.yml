name: Metrics
on:
  schedule:
    - cron: "0 0 * * *" # Запуск каждый день в 00:00 по UTC
  workflow_dispatch:
  push:
    branches: ["main"]
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: puxxalwl
          template: classic
          base: header, community, repositories, metadata
          config_timezone: UTC
          theme: codestackr
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          config_display: large
          config_order: base.header, isocalendar, languages, base.repositories
